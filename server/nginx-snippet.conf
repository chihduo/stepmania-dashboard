# StepMania dashboard upload endpoint.
# Add these lines INSIDE the existing `server { listen 443 ssl; ... }` block
# in /etc/nginx/sites-enabled/default (basic auth is inherited).
#
# After editing: sudo nginx -t && sudo systemctl reload nginx
# (Or run server/install.sh which can do the awk-insert + reload for you.)

# Server-level limits for the upload (StepMania bundle ~300 MB on home upload
# can take several minutes). These apply to all locations in the server block,
# but they're maxima, not defaults — no effect on smaller requests.
client_max_body_size 400m;
client_body_timeout 600s;
send_timeout 600s;

location /stepmania-upload/ {
    # Only accept exactly /stepmania-upload/sm-bundle.zip; everything else 405.
    if ($request_uri != "/stepmania-upload/sm-bundle.zip") { return 405; }

    dav_methods PUT;
    create_full_put_path on;
    dav_access user:rw group:r all:r;

    alias /var/www/stepmania-incoming/;
    client_body_temp_path /var/www/stepmania-incoming/.tmp;

    limit_except PUT { deny all; }
}
